name: libvmi-rust-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build, attest, and publish release artifacts
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
      SOURCE_DATE_EPOCH: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libbz2-dev liblzma-dev libzstd-dev
      - name: Verify tag matches workspace version
        if: github.event_name == 'push'
        shell: python
        run: |
          import os
          import pathlib
          import tomllib

          version = tomllib.loads(pathlib.Path("Cargo.toml").read_text())["workspace"]["package"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if tag != f"v{version}":
              raise SystemExit(f"tag {tag!r} does not match workspace version v{version}")
      - run: python scripts/verify-package-metadata.py
      - if: github.event_name == 'push'
        run: python scripts/verify-release-readiness.py --require-complete
      - if: github.event_name == 'workflow_dispatch'
        run: python scripts/verify-release-readiness.py
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit
      - run: cargo install cargo-deny --version 0.20.2 --locked
      - run: cargo deny check
      - run: cargo test --workspace --all-targets --release
      - run: cargo build --release -p vmi-cli -p vmi-ffi
      - name: Verify reproducible release binaries
        shell: bash
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=target-repro cargo build --release -p vmi-cli -p vmi-ffi
          cmp target/release/vmi-cli target-repro/release/vmi-cli
          cmp target/release/libvmi_ffi.so target-repro/release/libvmi_ffi.so
          cmp target/release/libvmi_ffi.a target-repro/release/libvmi_ffi.a
      - run: cargo install cargo-cyclonedx --version 0.5.9 --locked
      - run: cargo cyclonedx --format json --all-features
      - name: Preserve generator SBOMs for attestation
        run: |
          mkdir -p target/attestation-sbom
          cp crates/vmi-cli/vmi-cli.cdx.json target/attestation-sbom/vmi-cli.cdx.json
          cp crates/vmi-ffi/vmi-ffi.cdx.json target/attestation-sbom/vmi-ffi.cdx.json
      - name: Normalize release SBOMs
        run: python scripts/normalize-sbom.py crates/vmi-cli/vmi-cli.cdx.json crates/vmi-ffi/vmi-ffi.cdx.json
      - name: Assemble release bundle
        shell: bash
        run: |
          set -euo pipefail
          release_label=${GITHUB_REF_NAME//\//-}
          echo "RELEASE_LABEL=$release_label" >> "$GITHUB_ENV"
          mkdir -p dist/cli dist/ffi
          cp target/release/vmi-cli dist/cli/
          cp crates/vmi-cli/vmi-cli.cdx.json README.md dist/cli/
          cp target/release/libvmi_ffi.so target/release/libvmi_ffi.a dist/ffi/
          cp crates/vmi-ffi/include/vmi.h crates/vmi-ffi/vmi-ffi.cdx.json README.md dist/ffi/
          tar --sort=name --mtime="UTC 1970-01-01" --owner=0 --group=0 --numeric-owner -czf "libvmi-rust-cli-${release_label}-x86_64-unknown-linux-gnu.tar.gz" -C dist/cli .
          tar --sort=name --mtime="UTC 1970-01-01" --owner=0 --group=0 --numeric-owner -czf "libvmi-rust-ffi-${release_label}-x86_64-unknown-linux-gnu.tar.gz" -C dist/ffi .
          sha256sum libvmi-rust-*.tar.gz > SHA256SUMS
      - name: Attest CLI provenance
        uses: actions/attest@v4
        with:
          subject-path: "libvmi-rust-cli-*.tar.gz"
      - name: Attest CLI SBOM
        uses: actions/attest@v4
        with:
          subject-path: "libvmi-rust-cli-*.tar.gz"
          sbom-path: "target/attestation-sbom/vmi-cli.cdx.json"
      - name: Attest FFI provenance
        uses: actions/attest@v4
        with:
          subject-path: "libvmi-rust-ffi-*.tar.gz"
      - name: Attest FFI SBOM
        uses: actions/attest@v4
        with:
          subject-path: "libvmi-rust-ffi-*.tar.gz"
          sbom-path: "target/attestation-sbom/vmi-ffi.cdx.json"
      - name: Publish GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" libvmi-rust-*.tar.gz SHA256SUMS --verify-tag --generate-notes
      - name: Retain candidate bundles
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-${{ env.RELEASE_LABEL }}
          path: |
            libvmi-rust-*.tar.gz
            SHA256SUMS
          if-no-files-found: error
          retention-days: 30
